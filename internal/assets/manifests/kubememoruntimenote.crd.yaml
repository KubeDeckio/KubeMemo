apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runtimememos.runtime.notes.kubememo.io
spec:
  group: runtime.notes.kubememo.io
  scope: Namespaced
  names:
    plural: runtimememos
    singular: runtimememo
    kind: RuntimeMemo
    shortNames:
      - kmr
      - rmemo
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - title
                - noteType
                - target
              properties:
                title:
                  type: string
                summary:
                  type: string
                content:
                  type: string
                format:
                  type: string
                noteType:
                  type: string
                  enum:
                    - incident
                    - activity
                    - temporary-advisory
                    - temporary-warning
                    - temporary-suppression
                temporary:
                  type: boolean
                severity:
                  type: string
                owner:
                  type: object
                  properties:
                    team:
                      type: string
                    contact:
                      type: string
                target:
                  type: object
                  properties:
                    mode:
                      type: string
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    namespace:
                      type: string
                    name:
                      type: string
                    appRef:
                      type: object
                      properties:
                        name:
                          type: string
                        instance:
                          type: string
                source:
                  type: object
                  properties:
                    type:
                      type: string
                    generator:
                      type: string
                    confidence:
                      type: string
                activity:
                  type: object
                  properties:
                    action:
                      type: string
                    fieldPath:
                      type: string
                    oldValue:
                      type: string
                    newValue:
                      type: string
                    actor:
                      type: string
                    actorType:
                      type: string
                    detectedAt:
                      type: string
                tags:
                  type: array
                  items:
                    type: string
                links:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      title:
                        type: string
                      url:
                        type: string
                validFrom:
                  type: string
                createdAt:
                  type: string
                expiresAt:
                  type: string
                createdBy:
                  type: string
                updatedBy:
                  type: string
            status:
              type: object
              properties:
                state:
                  type: string
                expired:
                  type: boolean
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.noteType
        - name: Temporary
          type: boolean
          jsonPath: .spec.temporary
        - name: Expires
          type: string
          jsonPath: .spec.expiresAt

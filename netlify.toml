[build]
  command = "python -m pip install --upgrade pip && python -m pip install -r requirements-docs.txt && cp CHANGELOG.md docs/changelog.md && mkdocs build --strict"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

[context.production]
  command = "python -m pip install --upgrade pip && python -m pip install -r requirements-docs.txt && cp CHANGELOG.md docs/changelog.md && mkdocs build --strict"

[context.deploy-preview]
  command = "python -m pip install --upgrade pip && python -m pip install -r requirements-docs.txt && cp CHANGELOG.md docs/changelog.md && mkdocs build --strict"

[context.branch-deploy]
  command = "python -m pip install --upgrade pip && python -m pip install -r requirements-docs.txt && cp CHANGELOG.md docs/changelog.md && mkdocs build --strict"

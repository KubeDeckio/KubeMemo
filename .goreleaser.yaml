version: 2

project_name: kubememo

builds:
  - id: kubememo
    main: ./cmd/kubememo
    binary: kubememo
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - kubememo
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

brews:
  - name: kubememo
    repository:
      owner: KubeDeckio
      name: homebrew-tap
    homepage: https://github.com/KubeDeckio/KubeMemo
    description: Kubernetes operational memory CLI and TUI
    license: MIT

release:
  draft: false

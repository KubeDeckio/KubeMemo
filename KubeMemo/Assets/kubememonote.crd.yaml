apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: memos.notes.kubememo.io
spec:
  group: notes.kubememo.io
  scope: Namespaced
  names:
    plural: memos
    singular: memo
    kind: Memo
    shortNames:
      - km
      - memo
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - title
                - noteType
                - target
              properties:
                title:
                  type: string
                summary:
                  type: string
                content:
                  type: string
                format:
                  type: string
                noteType:
                  type: string
                  enum:
                    - advisory
                    - runbook
                    - ownership
                    - maintenance
                    - warning
                    - handover
                    - suppression
                    - audit
                severity:
                  type: string
                owner:
                  type: object
                  properties:
                    team:
                      type: string
                    contact:
                      type: string
                target:
                  type: object
                  properties:
                    mode:
                      type: string
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    namespace:
                      type: string
                    name:
                      type: string
                    appRef:
                      type: object
                      properties:
                        name:
                          type: string
                        instance:
                          type: string
                tags:
                  type: array
                  items:
                    type: string
                links:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      title:
                        type: string
                      url:
                        type: string
                validFrom:
                  type: string
                expiresAt:
                  type: string
                createdBy:
                  type: string
                updatedBy:
                  type: string
                source:
                  type: object
                  properties:
                    type:
                      type: string
                    git:
                      type: object
                      properties:
                        repo:
                          type: string
                        path:
                          type: string
                        revision:
                          type: string
            status:
              type: object
              properties:
                state:
                  type: string
                expired:
                  type: boolean
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.noteType
        - name: Target
          type: string
          jsonPath: .spec.target.name
        - name: Expires
          type: string
          jsonPath: .spec.expiresAt

name: Build and Push KubeMemo Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/kubedeckio/kubememo

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Update changelog
        run: cat CHANGELOG.md > docs/changelog.md

      - name: Build docs
        run: mkdocs build --strict

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Render chart
        run: |
          helm template kubememo ./charts/kubememo \
            --namespace kubememo-runtime \
            --set activityCapture.enabled=true

  integration-kind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create Kind cluster
        uses: helm/kind-action@v1.10.0

      - name: Run cluster-backed integration tests
        run: |
          KUBEMEMO_INTEGRATION=1 go test ./internal/service \
            -run 'TestClusterSmokeInstallCreateExportAndCleanup|TestRestrictedServiceAccountCanCreateMemoButCannotPatchAnnotations' \
            -count=1 -v

  docker-build:
    needs:
      - go-test
      - docs
      - helm-template
      - integration-kind
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set tag version
        id: meta
        run: |
          echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF##*/}" | sed 's/^version=v/version=/' >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

name: Publish Module to PowerShell Gallery

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set module version from tag
        shell: pwsh
        run: |
          $version = $Env:TAG -replace '^v', ''
          (Get-Content ./KubeMemo/KubeMemo.psd1) `
            -replace "^\s*ModuleVersion\s*=\s*'.*'", "    ModuleVersion     = '$version'" |
            Set-Content ./KubeMemo/KubeMemo.psd1

      - name: Build bundled binaries for module package
        shell: pwsh
        run: |
          $targets = @(
            @{ Goos = 'darwin'; Goarch = 'amd64' }
            @{ Goos = 'darwin'; Goarch = 'arm64' }
            @{ Goos = 'linux'; Goarch = 'amd64' }
            @{ Goos = 'linux'; Goarch = 'arm64' }
            @{ Goos = 'windows'; Goarch = 'amd64' }
            @{ Goos = 'windows'; Goarch = 'arm64' }
          )

          $stageRoot = Join-Path $PWD 'dist\psgallery'
          $moduleRoot = Join-Path $stageRoot 'KubeMemo'

          if (Test-Path $stageRoot) {
            Remove-Item $stageRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $moduleRoot | Out-Null
          Copy-Item ./KubeMemo/* $moduleRoot -Recurse -Force

          $binRoot = Join-Path $moduleRoot 'bin'
          if (Test-Path $binRoot) {
            Remove-Item $binRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $binRoot | Out-Null

          foreach ($target in $targets) {
            $outDir = Join-Path $binRoot "$($target.Goos)-$($target.Goarch)"
            New-Item -ItemType Directory -Path $outDir -Force | Out-Null
            $output = Join-Path $outDir 'kubememo'
            if ($target.Goos -eq 'windows') {
              $output = "$output.exe"
            }

            $env:GOOS = $target.Goos
            $env:GOARCH = $target.Goarch
            $env:CGO_ENABLED = '0'
            $version = $Env:TAG -replace '^v', ''
            go build -trimpath -ldflags="-s -w -X github.com/KubeDeckio/KubeMemo/internal/cli.version=$version" -o $output ./cmd/kubememo
            if ($LASTEXITCODE -ne 0) {
              throw "go build failed for $($target.Goos)/$($target.Goarch)"
            }
          }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./KubeMemo -Recurse -Severity Error, Warning
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
          }

          $errors = $results | Where-Object Severity -eq 'Error'
          if ($errors) {
            throw "PSScriptAnalyzer found errors."
          }

      - name: Validate module manifest and import
        shell: pwsh
        run: |
          $modulePath = Join-Path $PWD 'dist\psgallery\KubeMemo\KubeMemo.psd1'
          $manifest = Test-ModuleManifest -Path $modulePath
          Write-Host "Validated module version: $($manifest.Version)"
          Import-Module $modulePath -Force
          Get-Command -Module KubeMemo | Select-Object Name

      - name: Publish module to PowerShell Gallery
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Publish-Module -Path ./dist/psgallery/KubeMemo -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}

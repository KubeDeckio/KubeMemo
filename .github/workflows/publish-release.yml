name: Publish KubeMemo Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set module version from tag
        shell: pwsh
        run: |
          $version = $Env:TAG -replace '^v', ''
          (Get-Content ./KubeMemo/KubeMemo.psd1) `
            -replace "^\s*ModuleVersion\s*=\s*'.*'", "    ModuleVersion     = '$version'" |
            Set-Content ./KubeMemo/KubeMemo.psd1

      - name: Build release archives and module bundle
        shell: bash
        run: |
          set -euo pipefail

          version="${TAG#v}"
          release_dir="dist/release"
          module_stage="dist/module/KubeMemo"

          rm -rf dist
          mkdir -p "$release_dir" "$module_stage/bin"
          cp -R KubeMemo/* "$module_stage/"
          rm -rf "$module_stage/bin"
          mkdir -p "$module_stage/bin"

          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            bin_dir="dist/bin/${goos}-${goarch}"
            mkdir -p "$bin_dir" "$module_stage/bin/${goos}-${goarch}"

            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X github.com/KubeDeckio/KubeMemo/internal/cli.version=${version}" -o "$bin_dir/kubememo$ext" ./cmd/kubememo

            cp "$bin_dir/kubememo$ext" "$module_stage/bin/${goos}-${goarch}/"

            asset="kubememo_${version}_${goos}_${goarch}"
            if [[ "$goos" == "windows" ]]; then
              (
                cd "$bin_dir"
                zip -q "../../release/${asset}.zip" "kubememo$ext"
              )
            else
              tar -C "$bin_dir" -czf "$release_dir/${asset}.tar.gz" "kubememo$ext"
            fi
          done

          tar -C dist/module -czf "$release_dir/KubeMemo-psmodule_${version}.tar.gz" KubeMemo
          tar -C charts -czf "$release_dir/kubememo-chart_${version}.tgz" kubememo
          (
            cd "$release_dir"
            sha256sum ./* > checksums.txt
          )

      - name: Extract release notes from changelog
        shell: pwsh
        run: |
          $version = $Env:TAG -replace '^v', ''
          $changelogPath = "CHANGELOG.md"
          $content = Get-Content -Path $changelogPath -Raw

          if ($content -match "(?ms)^##\s+$version\s*$.*?(?=^##\s+|\z)") {
            $matches[0].Trim() | Out-File -FilePath "dist/release/release_notes.md" -Encoding utf8
          }
          else {
            Write-Host "No changelog section found for version $version."
            exit 1
          }

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*
          body_path: dist/release/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: build-and-release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download source archive
        run: |
          set -euo pipefail
          curl -L -o source.tar.gz "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "SOURCE_SHA=$(sha256sum source.tar.gz | awk '{print $1}')" >> $GITHUB_ENV

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: KubeDeckio/homebrew-tap
          token: ${{ secrets.BREW_BUMP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          version="${TAG#v}"
          formula="Formula/kubememo.rb"
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"

          sed -i.bak "s|url \".*\"|url \"$url\"|" "$formula"
          sed -i.bak "s|sha256 \".*\"|sha256 \"$SOURCE_SHA\"|" "$formula"
          sed -i.bak "s|version \".*\"|version \"$version\"|" "$formula" || true
          rm -f "$formula.bak"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$formula"
          git commit -m "Bump kubememo formula to ${TAG}" || exit 0
          git push

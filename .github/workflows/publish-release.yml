name: Publish KubeMemo Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Update changelog
        run: cat CHANGELOG.md > docs/changelog.md

      - name: Build docs
        run: mkdocs build --strict

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.15.4

      - name: Render chart
        run: |
          helm template kubememo ./charts/kubememo \
            --namespace kubememo-runtime \
            --set activityCapture.enabled=true

  integration-kind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Run cluster-backed integration tests
        run: |
          KUBEMEMO_INTEGRATION=1 go test ./internal/service \
            -run 'TestClusterSmokeInstallCreateExportAndCleanup|TestRestrictedServiceAccountCanCreateMemoButCannotPatchAnnotations' \
            -count=1 -v

  build-and-release:
    needs:
      - go-test
      - docs
      - helm-template
      - integration-kind
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect prerelease tag
        id: prerelease
        shell: bash
        run: |
          set -euo pipefail
          tag="${TAG#v}"
          if [[ "$tag" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-(.+)$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "stable_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "prerelease_label=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "stable_version=$tag" >> "$GITHUB_OUTPUT"
            echo "prerelease_label=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Set module version from tag
        shell: pwsh
        run: |
          $version = "${{ steps.prerelease.outputs.stable_version }}"
          $prerelease = "${{ steps.prerelease.outputs.prerelease_label }}"
          $manifestPath = "./KubeMemo/KubeMemo.psd1"
          $content = Get-Content $manifestPath -Raw

          $content = $content -replace "^\s*ModuleVersion\s*=\s*'.*'", "    ModuleVersion     = '$version'"

          if ([string]::IsNullOrWhiteSpace($prerelease)) {
            $content = $content -replace "(?ms)\r?\n\s*Prerelease\s*=\s*'.*?'", ""
          }
          else {
            if ($content -match "(?ms)PSData\s*=\s*@\{") {
              if ($content -match "(?ms)\r?\n\s*Prerelease\s*=\s*'.*?'") {
                $content = $content -replace "(?ms)(\r?\n\s*Prerelease\s*=\s*').*?(')", "`$1$prerelease`$2"
              }
              else {
                $content = $content -replace "(?ms)(PSData\s*=\s*@\{)", "`$1`r`n            Prerelease = '$prerelease'"
              }
            }
          }

          Set-Content -Path $manifestPath -Value $content

      - name: Set chart version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.prerelease.outputs.stable_version }}"
          sed -i.bak "s/^version: .*/version: ${version}/" charts/kubememo/Chart.yaml
          sed -i.bak "s/^appVersion: .*/appVersion: \\\"${version}\\\"/" charts/kubememo/Chart.yaml
          rm -f charts/kubememo/Chart.yaml.bak

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.15.4

      - name: Build release archives and module bundle
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.prerelease.outputs.stable_version }}"
          release_dir="dist/release"
          module_stage="dist/module/KubeMemo"

          rm -rf dist
          mkdir -p "$release_dir" "$module_stage/bin"
          cp -R KubeMemo/* "$module_stage/"
          rm -rf "$module_stage/bin"
          mkdir -p "$module_stage/bin"

          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            bin_dir="dist/bin/${goos}-${goarch}"
            mkdir -p "$bin_dir" "$module_stage/bin/${goos}-${goarch}"

            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X github.com/KubeDeckio/KubeMemo/internal/cli.version=${version}" -o "$bin_dir/kubememo$ext" ./cmd/kubememo

            cp "$bin_dir/kubememo$ext" "$module_stage/bin/${goos}-${goarch}/"

            asset="kubememo_${version}_${goos}_${goarch}"
            if [[ "$goos" == "windows" ]]; then
              (
                cd "$bin_dir"
                zip -q "../../release/${asset}.zip" "kubememo$ext"
              )
            else
              tar -C "$bin_dir" -czf "$release_dir/${asset}.tar.gz" "kubememo$ext"
            fi
          done

          tar -C dist/module -czf "$release_dir/KubeMemo-psmodule_${version}.tar.gz" KubeMemo
          helm package charts/kubememo --destination "$release_dir"
          (
            cd "$release_dir"
            sha256sum ./* > checksums.txt
          )

      - name: Extract release notes from changelog
        shell: pwsh
        run: |
          $version = "${{ steps.prerelease.outputs.stable_version }}"
          $fullTagVersion = $Env:TAG -replace '^v', ''
          $changelogPath = "CHANGELOG.md"
          $content = Get-Content -Path $changelogPath -Raw

          if ($content -match "(?ms)^##\s+\[$fullTagVersion\]\s*-\s*.*?(?=^##\s+|\z)") {
            $matches[0].Trim() | Out-File -FilePath "dist/release/release_notes.md" -Encoding utf8
          }
          elseif ($content -match "(?ms)^##\s+\[$version\]\s*-\s*.*?(?=^##\s+|\z)") {
            $matches[0].Trim() | Out-File -FilePath "dist/release/release_notes.md" -Encoding utf8
          }
          elseif ($content -match "(?ms)^##\s+$version\s*$.*?(?=^##\s+|\z)") {
            $matches[0].Trim() | Out-File -FilePath "dist/release/release_notes.md" -Encoding utf8
          }
          else {
            Write-Host "No changelog section found for version $fullTagVersion or $version."
            exit 1
          }

      - name: Upload module bundle artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: psgallery-module
          path: dist/module/KubeMemo
          if-no-files-found: error

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            dist/release/*
          body_path: dist/release/release_notes.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR for Helm OCI push
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Helm chart to GHCR OCI
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.prerelease.outputs.stable_version }}"
          helm push "dist/release/kubememo-${version}.tgz" oci://ghcr.io/kubedeckio/charts

  publish-psgallery:
    needs: build-and-release
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Download module bundle artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: psgallery-module
          path: dist/psgallery/KubeMemo

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./dist/psgallery/KubeMemo -Recurse -Severity Error, Warning
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
          }

          $errors = $results | Where-Object Severity -eq 'Error'
          if ($errors) {
            throw "PSScriptAnalyzer found errors."
          }

      - name: Validate module manifest and import
        shell: pwsh
        run: |
          $modulePath = Join-Path $PWD 'dist\psgallery\KubeMemo\KubeMemo.psd1'
          $manifest = Test-ModuleManifest -Path $modulePath
          Write-Host "Validated module version: $($manifest.Version)"
          Import-Module $modulePath -Force
          Get-Command -Module KubeMemo | Select-Object Name

      - name: Publish module to PowerShell Gallery
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Publish-Module -Path ./dist/psgallery/KubeMemo -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}

  update-homebrew:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download source archive
        run: |
          set -euo pipefail
          curl -L -o source.tar.gz "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "SOURCE_SHA=$(sha256sum source.tar.gz | awk '{print $1}')" >> $GITHUB_ENV

      - name: Checkout homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: KubeDeckio/homebrew-kubememo
          token: ${{ secrets.BREW_BUMP_TOKEN }}
          path: homebrew-kubememo

      - name: Update formula
        working-directory: homebrew-kubememo
        run: |
          set -euo pipefail
          version="${TAG#v}"
          formula="Formula/kubememo.rb"
          url="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          cat >"$formula" <<EOF
          class Kubememo < Formula
            desc "Kubernetes operational memory with durable memos, runtime notes, and activity capture"
            homepage "https://kubememo.kubedeck.io"
            url "$url"
            sha256 "$SOURCE_SHA"
            license "MIT"
            depends_on "go" => :build

            def install
              system "go", "build", "-trimpath", "-ldflags", "-s -w -X github.com/KubeDeckio/KubeMemo/internal/cli.version=${version}", "-o", bin/"kubememo", "./cmd/kubememo"
            end

            test do
              assert_match "\"version\": \"${version}\"", shell_output("#{bin}/kubememo version")
            end
          end
          EOF

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$formula"
          git commit -m "Bump kubememo formula to ${TAG}" || exit 0
          git push
